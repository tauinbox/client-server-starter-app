services:
  redis:
    image: redis:7.4-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Conservative cap so a leaking/runaway container can't starve its neighbors.
    # Caps are sized from each service's own peak working set, not the host's RAM.
    mem_limit: 96m
    cap_drop:
      - ALL
    cap_add:
      # Entrypoint starts as root and drops to the redis user via gosu
      # (setuid/setgid syscalls); without these it exits "operation not permitted".
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      # Pinned explicitly: the postgres:18 image moved its default PGDATA to a
      # version-specific path (/var/lib/postgresql/18/docker).
      PGDATA: /var/lib/postgresql/data
      # Applies only on first init of an empty volume.
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      # Migrated from the PG16 volume via scripts/pg-upgrade-16-to-18.sh.
      - postgres_data_18:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Generous cap: shared_buffers/work_mem live in shmem (not anon RSS), so the
    # working set is larger than `docker stats` reports. Reservation guards a
    # minimum under host contention.
    mem_limit: 256m
    mem_reservation: 96m
    cap_drop:
      - ALL
    cap_add:
      # Entrypoint runs initdb/chown as root then drops to the postgres user via
      # gosu; this is the minimal set that lets init and the privilege drop succeed.
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  server:
    image: ${SERVER_IMAGE:-nexus-server:latest}
    build:
      context: .
      dockerfile: server/Dockerfile
    env_file: server/.env
    environment:
      DB_HOST: db
      REDIS_URL: redis://redis:6379
      ENVIRONMENT: production
      # Trust the reverse proxy on the same host (loopback) and any proxy sitting
      # inside docker bridge / shared networks (uniquelocal covers RFC1918).
      # Without this, req.ip is the proxy's address and every request shares
      # one throttler/audit key — see server/README.md "Deployment behind a
      # reverse proxy". Override by exporting TRUSTED_PROXIES in the shell.
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-loopback,uniquelocal}
    expose:
      - "3000"
    volumes:
      - uploads:/app/server/dist/server/public/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      # `shared` lets the host Caddy reverse-proxy reach this service by name
      # (Caddyfile: `/api/* -> server:3000`). Without it a recreate drops the
      # container from shared-network and Caddy returns 502.
      - default
      - shared
    # Headroom over the deploy-time migration/boot spike (peak ~179 MiB) so the
    # server is never OOM-killed mid-migration; reservation keeps a floor.
    mem_limit: 384m
    mem_reservation: 128m
    # Image runs as the non-root `node` user on port 3000 with no runtime privilege
    # drop, so it needs no Linux capabilities.
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  client:
    image: ${CLIENT_IMAGE:-nexus-client:latest}
    build:
      context: .
      dockerfile: client/Dockerfile
    ports:
      - "127.0.0.1:4200:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      server:
        # The SPA is static files served by nginx and has no runtime dependency
        # on backend health — only on start ordering. Gating on service_started
        # (not service_healthy) keeps the frontend reachable during a backend
        # outage; /api calls 502 until the server recovers, which interceptors
        # already surface as API errors.
        condition: service_started
    networks:
      # `shared` lets the host Caddy reverse-proxy reach this service by name
      # (Caddyfile: `/nexus/* -> client:8080`). Without it a recreate drops the
      # container from shared-network and Caddy returns 502.
      - default
      - shared
    # nginx serving static files — tiny, peak ~10 MiB.
    mem_limit: 64m
    # nginx runs as the non-root `nginx` user on port 8080; no capabilities needed.
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    expose:
      - "9090"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      server:
        condition: service_healthy
    # Memory grows with active series and 30d TSDB retention (peak ~93 MiB).
    mem_limit: 192m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.1
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3000}
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    healthcheck:
      # /api/health is served at the root even when serve_from_sub_path is on.
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      - prometheus
    networks:
      - default
      - shared
    # Biggest observed spiker (peak ~216 MiB during provisioning/render); cap
    # leaves headroom above that. Raise toward 320m if it ever gets OOM-killed.
    mem_limit: 256m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

networks:
  shared:
    external: true
    name: shared-network

volumes:
  postgres_data_18:
  uploads:
  prometheus_data:
  grafana_data:
