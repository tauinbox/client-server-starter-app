services:
  postgres:
    container_name: postgres_container
    image: postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA: /data/postgres
    volumes:
      - postgres_data:/data/postgres
    ports:
      - "5432:5432"
    networks:
      - postgres_network
    restart: unless-stopped

  # Local dev SMTP sink — captures all outgoing email instead of delivering it.
  # Set SMTP_HOST=localhost / SMTP_PORT=1025 in server/.env to route mail here;
  # inspect captured messages at http://localhost:8025 (web UI + REST API).
  mailpit:
    container_name: mailpit_container
    image: axllent/mailpit:v1.30.0
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI + REST API
    networks:
      - postgres_network
    restart: unless-stopped

networks:
  postgres_network:
    driver: bridge

volumes:
  postgres_data:
