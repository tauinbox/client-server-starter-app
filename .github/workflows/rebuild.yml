name: Scheduled Rebuild

on:
  schedule:
    - cron: '0 3 * * 0'  # Every Sunday at 03:00 UTC
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  rebuild-push:
    name: Rebuild & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: write
    outputs:
      sha: ${{ steps.short-sha.outputs.sha }}
      owner: ${{ steps.lowercase-owner.outputs.owner }}

    steps:
      - uses: actions/checkout@v6

      - name: Get commit short SHA
        id: short-sha
        run: |
          SHA=$(git rev-parse --short HEAD)
          echo "COMMIT_HASH=$SHA" >> $GITHUB_ENV
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repository owner
        id: lowercase-owner
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          echo "OWNER=$OWNER" >> $GITHUB_ENV
          echo "owner=$OWNER" >> $GITHUB_OUTPUT

      # Save current :latest as :pre-rebuild so we can roll back if the new build breaks VPS
      - name: Snapshot current images as pre-rebuild
        run: |
          for IMAGE in nexus-server nexus-client; do
            REF="ghcr.io/${{ env.OWNER }}/${IMAGE}"
            if docker pull "${REF}:latest"; then
              docker tag "${REF}:latest" "${REF}:pre-rebuild"
              docker push "${REF}:pre-rebuild"
            fi
          done

      - name: Server image metadata
        id: meta-server
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ env.OWNER }}/nexus-server
          tags: |
            type=raw,value=latest
            type=raw,value=sha-${{ env.COMMIT_HASH }}

      - name: Client image metadata
        id: meta-client
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ env.OWNER }}/nexus-client
          tags: |
            type=raw,value=latest
            type=raw,value=sha-${{ env.COMMIT_HASH }}

      # no-cache: true forces fresh apk upgrade; load: true builds locally for scan before push
      - name: Build server image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: server/Dockerfile
          push: false
          load: true
          tags: ${{ steps.meta-server.outputs.tags }}
          no-cache: true

      - name: Scan server image
        id: scan-server
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ env.OWNER }}/nexus-server:sha-${{ env.COMMIT_HASH }}
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL

      - name: Build client image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: client/Dockerfile
          push: false
          load: true
          tags: ${{ steps.meta-client.outputs.tags }}
          build-args: COMMIT_HASH=${{ env.COMMIT_HASH }}
          no-cache: true

      - name: Scan client image
        id: scan-client
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ env.OWNER }}/nexus-client:sha-${{ env.COMMIT_HASH }}
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL

      # If any scan found HIGH/CRITICAL CVEs: identify vulnerable Alpine packages,
      # add edge/main patches to the affected Dockerfiles, rebuild, re-scan to verify,
      # then open a PR. The step exits 1 so the deploy job is skipped until the PR is merged.
      - name: Auto-patch CVEs and open PR
        if: steps.scan-server.outcome == 'failure' || steps.scan-client.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          IMAGE_SERVER="ghcr.io/${{ env.OWNER }}/nexus-server:sha-${{ env.COMMIT_HASH }}"
          IMAGE_CLIENT="ghcr.io/${{ env.OWNER }}/nexus-client:sha-${{ env.COMMIT_HASH }}"
          SERVER_PKGS=""
          CLIENT_PKGS=""

          # Extract vulnerable Alpine OS package names from Trivy JSON output.
          # Node npm CVEs (type=node-pkg) are skipped — those require dependency updates.
          if [[ "${{ steps.scan-server.outcome }}" == "failure" ]]; then
            SERVER_PKGS=$(trivy image \
              --format json \
              --severity HIGH,CRITICAL \
              --quiet \
              "$IMAGE_SERVER" | \
              jq -r '
                .Results[]?
                | select(.Type == "alpine")
                | .Vulnerabilities[]?
                | select(.Severity == "HIGH" or .Severity == "CRITICAL")
                | .PkgName
              ' | sort -u | xargs)
            echo "Server Alpine packages to patch: ${SERVER_PKGS:-none}"
          fi

          if [[ "${{ steps.scan-client.outcome }}" == "failure" ]]; then
            CLIENT_PKGS=$(trivy image \
              --format json \
              --severity HIGH,CRITICAL \
              --quiet \
              "$IMAGE_CLIENT" | \
              jq -r '
                .Results[]?
                | select(.Type == "alpine")
                | .Vulnerabilities[]?
                | select(.Severity == "HIGH" or .Severity == "CRITICAL")
                | .PkgName
              ' | sort -u | xargs)
            echo "Client Alpine packages to patch: ${CLIENT_PKGS:-none}"
          fi

          if [[ -z "$SERVER_PKGS" && -z "$CLIENT_PKGS" ]]; then
            echo "No Alpine OS packages to patch — CVEs are in npm dependencies and require manual dependency updates"
            exit 1
          fi

          # Patch Dockerfiles and rebuild affected images
          if [[ -n "$SERVER_PKGS" ]]; then
            python3 scripts/patch-dockerfile.py server/Dockerfile $SERVER_PKGS
            docker build --no-cache -f server/Dockerfile \
              -t "$IMAGE_SERVER" .
          fi

          if [[ -n "$CLIENT_PKGS" ]]; then
            python3 scripts/patch-dockerfile.py client/Dockerfile $CLIENT_PKGS
            docker build --no-cache -f client/Dockerfile \
              --build-arg COMMIT_HASH="${{ env.COMMIT_HASH }}" \
              -t "$IMAGE_CLIENT" .
          fi

          # Re-scan patched images to verify the fixes work
          VERIFY_OK=true
          if [[ -n "$SERVER_PKGS" ]]; then
            echo "Re-scanning server image..."
            if ! trivy image --severity HIGH,CRITICAL --exit-code 1 --quiet "$IMAGE_SERVER"; then
              echo "Server image still has HIGH/CRITICAL CVEs after patching"
              VERIFY_OK=false
            fi
          fi
          if [[ -n "$CLIENT_PKGS" ]]; then
            echo "Re-scanning client image..."
            if ! trivy image --severity HIGH,CRITICAL --exit-code 1 --quiet "$IMAGE_CLIENT"; then
              echo "Client image still has HIGH/CRITICAL CVEs after patching"
              VERIFY_OK=false
            fi
          fi

          if [[ "$VERIFY_OK" == "false" ]]; then
            echo "Edge patches did not resolve all CVEs — manual intervention required"
            exit 1
          fi

          # Open a PR with the Dockerfile changes
          BRANCH="fix/auto-edge-patch-$(date +%Y-%m-%d)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add server/Dockerfile client/Dockerfile
          git commit -m "fix(docker): add edge channel patches for newly detected CVEs"
          git push --force origin "$BRANCH"

          PR_BODY=$(cat <<EOF
## Summary
Scheduled rebuild detected new HIGH/CRITICAL CVEs in Alpine OS packages.
Edge channel patches have been added and verified to resolve all findings.

**Server patches:** ${SERVER_PKGS:-none}
**Client patches:** ${CLIENT_PKGS:-none}

## Test plan
- [ ] Trivy scan passes on CI after merge
- [ ] Next scheduled rebuild deploys cleanly
EOF
          )

          EXISTING=$(gh pr list --head "$BRANCH" --json number -q '.[0].number' 2>/dev/null || true)
          if [[ -n "$EXISTING" ]]; then
            gh pr edit "$EXISTING" --body "$PR_BODY"
            echo "Updated existing PR #$EXISTING"
          else
            gh pr create \
              --title "fix(docker): edge channel patches for new CVEs ($(date +%Y-%m-%d))" \
              --body "$PR_BODY"
          fi

          echo "PR opened — deploy is blocked until the patch PR is reviewed and merged"
          exit 1  # Prevent deploy with unpatched images

      # Push only after both scans pass cleanly (no CVEs, no auto-patch ran)
      - name: Push server image
        if: steps.scan-server.outcome == 'success' && steps.scan-client.outcome == 'success'
        run: |
          docker push ghcr.io/${{ env.OWNER }}/nexus-server:sha-${{ env.COMMIT_HASH }}
          docker push ghcr.io/${{ env.OWNER }}/nexus-server:latest

      - name: Push client image
        if: steps.scan-server.outcome == 'success' && steps.scan-client.outcome == 'success'
        run: |
          docker push ghcr.io/${{ env.OWNER }}/nexus-client:sha-${{ env.COMMIT_HASH }}
          docker push ghcr.io/${{ env.OWNER }}/nexus-client:latest

  deploy:
    name: Deploy to VPS
    needs: rebuild-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: DEPLOY_SHA,OWNER,GRAFANA_ADMIN_PASSWORD,GRAFANA_ROOT_URL
          script: |
            set -euo pipefail
            cd /home/deploy/nexus
            # Clean up docker-compose.yml if a previous rollback left it modified
            git checkout HEAD -- docker-compose.yml 2>/dev/null || true
            git pull --ff-only

            PREV_SHA=""
            if [ -f .deployed-sha ]; then
              PREV_SHA=$(cat .deployed-sha)
            fi

            echo "Redeploying sha-${DEPLOY_SHA} with fresh OS packages (previous: ${PREV_SHA:-none})"

            docker compose pull
            docker compose up -d --remove-orphans

            # Require ALL services with healthcheck to be healthy
            EXPECTED=$(docker compose config 2>/dev/null | grep -c 'healthcheck:' || true)
            if [ "$EXPECTED" -lt 1 ]; then EXPECTED=4; fi
            echo "Expecting $EXPECTED services with healthcheck"
            TIMEOUT=120
            ELAPSED=0
            HEALTHY=0
            while [ $ELAPSED -lt $TIMEOUT ]; do
              if docker compose ps --format '{{.Health}}' | grep -q 'unhealthy'; then
                sleep 5
                ELAPSED=$((ELAPSED + 5))
                continue
              fi
              HEALTHY=$(docker compose ps --format '{{.Health}}' | grep -c 'healthy' || true)
              if [ "$HEALTHY" -ge "$EXPECTED" ]; then
                break
              fi
              sleep 5
              ELAPSED=$((ELAPSED + 5))
            done

            if [ "$HEALTHY" -ge "$EXPECTED" ]; then
              echo "Redeploy successful — sha-${DEPLOY_SHA}"
              cp -f .deployed-sha .prev-deployed-sha 2>/dev/null || true
              echo "$DEPLOY_SHA" > .deployed-sha
              docker image prune -f
              exit 0
            fi

            # Health check failed — roll back to pre-rebuild images
            echo "Health check failed after ${TIMEOUT}s — rolling back to pre-rebuild images"

            docker pull "ghcr.io/${OWNER}/nexus-server:pre-rebuild" || true
            docker pull "ghcr.io/${OWNER}/nexus-client:pre-rebuild" || true

            if docker image inspect "ghcr.io/${OWNER}/nexus-server:pre-rebuild" > /dev/null 2>&1 && \
               docker image inspect "ghcr.io/${OWNER}/nexus-client:pre-rebuild" > /dev/null 2>&1; then
              docker tag "ghcr.io/${OWNER}/nexus-server:pre-rebuild" "ghcr.io/${OWNER}/nexus-server:latest"
              docker tag "ghcr.io/${OWNER}/nexus-client:pre-rebuild" "ghcr.io/${OWNER}/nexus-client:latest"
              docker compose down
              docker compose up -d

              ELAPSED=0
              ROLLBACK_HEALTHY=0
              while [ $ELAPSED -lt $TIMEOUT ]; do
                if docker compose ps --format '{{.Health}}' | grep -q 'unhealthy'; then
                  sleep 5
                  ELAPSED=$((ELAPSED + 5))
                  continue
                fi
                ROLLBACK_HEALTHY=$(docker compose ps --format '{{.Health}}' | grep -c 'healthy' || true)
                if [ "$ROLLBACK_HEALTHY" -ge "$EXPECTED" ]; then
                  break
                fi
                sleep 5
                ELAPSED=$((ELAPSED + 5))
              done

              if [ "$ROLLBACK_HEALTHY" -ge "$EXPECTED" ]; then
                echo "Rolled back to pre-rebuild images successfully"
              else
                echo "Rollback health check also failed — manual intervention required"
              fi
            else
              echo "Pre-rebuild images not available — manual intervention required"
            fi

            exit 1
        env:
          DEPLOY_SHA: ${{ needs.rebuild-push.outputs.sha }}
          OWNER: ${{ needs.rebuild-push.outputs.owner }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          GRAFANA_ROOT_URL: ${{ secrets.GRAFANA_ROOT_URL }}
