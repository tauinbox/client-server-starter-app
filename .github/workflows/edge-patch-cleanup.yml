name: Quarterly CVE Patch Cleanup

on:
  schedule:
    - cron: '0 3 1 1,4,7,10 *'  # 03:00 UTC on 1st of Jan/Apr/Jul/Oct
  workflow_dispatch:

concurrency:
  group: cve-patch-cleanup
  cancel-in-progress: false

jobs:
  cleanup:
    name: Check & Clean CVE Patches
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - name: Check for CVE patch markers
        id: check
        run: |
          FILES=$(grep -rl 'CVE_PATCHES_START' client/Dockerfile server/Dockerfile 2>/dev/null || true)
          if [ -z "$FILES" ]; then
            echo "No CVE patch markers found — nothing to clean"
            echo "found=false" >> $GITHUB_OUTPUT
          else
            echo "CVE patches found in: $FILES"
            echo "found=true" >> $GITHUB_OUTPUT
          fi

      - name: Remove CVE patch blocks
        if: steps.check.outputs.found == 'true'
        run: |
          for f in client/Dockerfile server/Dockerfile; do
            if grep -q 'CVE_PATCHES_START' "$f" 2>/dev/null; then
              sed -i '/^# CVE_PATCHES_START/,/^# CVE_PATCHES_END/d' "$f"
              echo "Cleaned: $f"
            fi
          done

      - uses: docker/setup-buildx-action@v4
        if: steps.check.outputs.found == 'true'

      - uses: docker/login-action@v4
        if: steps.check.outputs.found == 'true'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase owner
        if: steps.check.outputs.found == 'true'
        run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Build server image
        if: steps.check.outputs.found == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: server/Dockerfile
          load: true
          tags: ghcr.io/${{ env.OWNER }}/nexus-server:patch-check
          no-cache: true

      - name: Scan server image
        if: steps.check.outputs.found == 'true'
        id: scan-server
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ env.OWNER }}/nexus-server:patch-check
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL

      - name: Build client image
        if: steps.check.outputs.found == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: client/Dockerfile
          load: true
          tags: ghcr.io/${{ env.OWNER }}/nexus-client:patch-check
          build-args: COMMIT_HASH=patch-check
          no-cache: true

      - name: Scan client image
        if: steps.check.outputs.found == 'true'
        id: scan-client
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ env.OWNER }}/nexus-client:patch-check
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL

      - name: Create cleanup PR
        if: steps.check.outputs.found == 'true' && steps.scan-server.outcome == 'success' && steps.scan-client.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_BODY: |
            ## Summary
            Quarterly automated check confirmed that the packages previously pinned in the
            explicit CVE patch blocks are now fixed in the base image (or its stable Alpine
            repositories). The explicit upgrade blocks are no longer needed.

            ## Test plan
            - [ ] Images built and scanned without the CVE patch blocks — Trivy passed
            - [ ] Verify next deploy succeeds after merge
        run: |
          BRANCH="chore/remove-cve-patches"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add client/Dockerfile server/Dockerfile
          git commit -m "chore(docker): remove CVE patch blocks — fixes now in base image"
          git push --force origin "$BRANCH"

          EXISTING=$(gh pr list --head "$BRANCH" --json number -q '.[0].number' 2>/dev/null || true)
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING updated with latest changes"
          else
            gh pr create \
              --title "Remove CVE patch blocks (now fixed in base image)" \
              --body "$PR_BODY"
          fi

      - name: Report — patches still needed
        if: steps.check.outputs.found == 'true' && (steps.scan-server.outcome == 'failure' || steps.scan-client.outcome == 'failure')
        run: echo "CVE patch blocks still needed — fixes not yet in the base image. Will check again next quarter."
