<ng-container *transloco="let t">
  <div class="nav-container" [class.wide]="sidenavState.isWide()">
    <nav class="nav-items">
      @for (link of sidenavState.navLinks(); track link.route) {
        <a
          class="nav-link"
          matRipple
          #rla="routerLinkActive"
          routerLinkActive
          [class.active]="rla.isActive"
          [routerLink]="link.route"
          [attr.aria-label]="t(link.labelKey)"
          [attr.aria-current]="rla.isActive ? 'page' : null"
          [matTooltip]="sidenavState.isWide() ? '' : t(link.labelKey)"
          matTooltipPosition="after"
        >
          <mat-icon aria-hidden="true">{{ link.icon }}</mat-icon>
          @if (sidenavState.isWide()) {
            <span>{{ t(link.labelKey) }}</span>
          }
        </a>
      }
    </nav>

    <div class="nav-footer">
      <a
        class="nav-link"
        matRipple
        #profileRla="routerLinkActive"
        routerLinkActive
        [class.active]="profileRla.isActive"
        [routerLink]="'/' + routes.Profile"
        [attr.aria-label]="t('sidenav.profile')"
        [attr.aria-current]="profileRla.isActive ? 'page' : null"
        [matTooltip]="sidenavState.isWide() ? '' : t('sidenav.profile')"
        matTooltipPosition="after"
      >
        <mat-icon aria-hidden="true">account_circle</mat-icon>
        @if (sidenavState.isWide()) {
          <span
            >{{ authStore.user()?.firstName }}
            {{ authStore.user()?.lastName }}</span
          >
        }
      </a>
    </div>
  </div>

  <button
    class="toggle-btn"
    [class.wide]="sidenavState.isWide()"
    matRipple
    (click)="sidenavState.toggleWide()"
    [attr.aria-label]="
      sidenavState.isWide() ? t('sidenav.collapse') : t('sidenav.expand')
    "
    [attr.aria-expanded]="sidenavState.isWide()"
    [matTooltip]="
      sidenavState.isWide() ? t('sidenav.collapse') : t('sidenav.expand')
    "
    matTooltipPosition="after"
  >
    <mat-icon aria-hidden="true">{{
      sidenavState.isWide() ? 'chevron_left' : 'chevron_right'
    }}</mat-icon>
  </button>
</ng-container>
