<mat-toolbar *transloco="let t">
  @if (authStore.isAuthenticated() && sidenavState.isMobile()) {
    <button
      matIconButton
      (click)="sidenavState.toggleMobileOpen()"
      [attr.aria-label]="t('sidenav.openNavigation')"
    >
      <mat-icon>menu</mat-icon>
    </button>
  }
  <span class="app-brand" [matTooltip]="appVersion">{{ appName }}</span>
  <span class="spacer"></span>

  <nxs-language-switcher></nxs-language-switcher>
  <nxs-theme-toggle></nxs-theme-toggle>

  @if (authStore.isAuthenticated()) {
    <button matButton="text" [matMenuTriggerFor]="menu">
      {{ authStore.user()?.firstName }} {{ authStore.user()?.lastName }}
      <mat-icon aria-hidden="true">expand_more</mat-icon>
    </button>
    <mat-menu #menu="matMenu">
      <button mat-menu-item (click)="logout()">
        <mat-icon aria-hidden="true">logout</mat-icon>
        <span>{{ t('header.logout') }}</span>
      </button>
    </mat-menu>
  } @else {
    <button
      matButton="text"
      [routerLink]="'/' + routes.Login"
      routerLinkActive="active"
    >
      {{ t('header.login') }}
    </button>
    <button
      matButton="text"
      [routerLink]="'/' + routes.Register"
      routerLinkActive="active"
    >
      {{ t('header.register') }}
    </button>
  }
</mat-toolbar>
