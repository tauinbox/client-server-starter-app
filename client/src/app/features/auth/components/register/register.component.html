<div class="register-container" *transloco="let t; scope: 'auth'">
  <mat-card>
    <mat-card-header>
      <mat-card-title>{{ t('auth.register.title') }}</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form (submit)="$event.preventDefault(); onSubmit()">
        <app-form-field
          [field]="registerForm.email"
          label="auth.register.email"
          type="email"
          prefixIcon="email"
          autocomplete="on"
        />

        <app-form-field
          [field]="registerForm.firstName"
          label="auth.register.firstName"
          prefixIcon="person"
          autocomplete="on"
        />

        <app-form-field
          [field]="registerForm.lastName"
          label="auth.register.lastName"
          prefixIcon="person"
          autocomplete="on"
        />

        <app-form-field
          [field]="registerForm.password"
          label="auth.register.password"
          [type]="pwdToggle.show() ? 'text' : 'password'"
          prefixIcon="lock"
          autocomplete="off"
        >
          <app-password-toggle formFieldSuffix #pwdToggle />
        </app-form-field>

        <app-password-strength [password]="registerModel().password" />

        @if (captchaRequired()) {
          <app-captcha-widget (tokenChange)="onCaptchaToken($event)" />
        }

        @if (error()) {
          <div class="error-message" role="alert">
            {{ error() }}
          </div>
        }

        <div class="form-actions">
          <button matButton="filled" type="submit" [disabled]="!canSubmit()">
            @if (loading()) {
              <mat-spinner diameter="24"></mat-spinner>
              <span class="ml-2">{{ t('auth.register.registering') }}</span>
            } @else {
              {{ t('auth.register.title') }}
            }
          </button>
        </div>
      </form>
    </mat-card-content>

    <mat-card-actions>
      <p class="text-center full-width">
        {{ t('auth.register.haveAccount') }}
        <a [routerLink]="'/' + appRouteSegmentEnum.Login">{{
          t('auth.register.login')
        }}</a>
      </p>
    </mat-card-actions>
  </mat-card>
</div>
