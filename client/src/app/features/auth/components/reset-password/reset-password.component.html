<div class="reset-password-container" *transloco="let t; scope: 'auth'">
  <mat-card>
    <mat-card-header>
      <mat-card-title>{{ t('auth.resetPassword.title') }}</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      @if (invalidToken()) {
        <div class="status-container error">
          <mat-icon>error_outline</mat-icon>
          <h3>{{ t('auth.resetPassword.invalidTokenTitle') }}</h3>
          <p>{{ error() }}</p>
          <button matButton="filled" routerLink="/forgot-password">
            {{ t('auth.resetPassword.requestNewLink') }}
          </button>
        </div>
      } @else {
        <p class="instructions">
          {{ t('auth.resetPassword.instructions') }}
        </p>

        <form (submit)="$event.preventDefault(); onSubmit()">
          <app-form-field
            [field]="resetPasswordForm.password"
            label="auth.resetPassword.newPassword"
            [type]="pwdToggle.show() ? 'text' : 'password'"
            prefixIcon="lock"
            autocomplete="off"
          >
            <app-password-toggle formFieldSuffix #pwdToggle />
          </app-form-field>

          <app-password-strength [password]="resetPasswordModel().password" />

          <app-form-field
            [field]="resetPasswordForm.confirmPassword"
            label="auth.resetPassword.confirmPassword"
            [type]="confirmPwdToggle.show() ? 'text' : 'password'"
            prefixIcon="lock"
            autocomplete="off"
          >
            <app-password-toggle formFieldSuffix #confirmPwdToggle />
          </app-form-field>

          @if (error()) {
            <div class="error-message" role="alert">
              {{ error() }}
            </div>
          }

          <div class="form-actions">
            <button
              matButton="filled"
              type="submit"
              [disabled]="resetPasswordForm().invalid() || loading()"
            >
              @if (loading()) {
                <mat-spinner diameter="24"></mat-spinner>
                <span class="ml-2">{{
                  t('auth.resetPassword.resetting')
                }}</span>
              } @else {
                {{ t('auth.resetPassword.submit') }}
              }
            </button>
          </div>
        </form>
      }
    </mat-card-content>
  </mat-card>
</div>
