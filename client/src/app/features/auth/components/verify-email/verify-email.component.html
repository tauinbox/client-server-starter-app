<div class="verify-email-container" *transloco="let t; scope: 'auth'">
  <mat-card>
    <mat-card-header>
      <mat-card-title>{{ t('auth.verifyEmail.title') }}</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      @if (loading()) {
        <div class="status-container">
          <mat-spinner diameter="48"></mat-spinner>
          <p>{{ t('auth.verifyEmail.verifying') }}</p>
        </div>
      } @else if (success()) {
        <div class="status-container success">
          <mat-icon>check_circle</mat-icon>
          <h3>{{ t('auth.verifyEmail.successTitle') }}</h3>
          <p>{{ t('auth.verifyEmail.successMessage') }}</p>
          <button matButton="filled" routerLink="/login">
            {{ t('auth.verifyEmail.goToLogin') }}
          </button>
        </div>
      } @else {
        <div class="status-container error">
          <mat-icon>error_outline</mat-icon>
          <h3>{{ t('auth.verifyEmail.failedTitle') }}</h3>
          <p>{{ error() }}</p>
          <button matButton="filled" routerLink="/login">
            {{ t('auth.verifyEmail.goToLogin') }}
          </button>
        </div>
      }
    </mat-card-content>
  </mat-card>
</div>
