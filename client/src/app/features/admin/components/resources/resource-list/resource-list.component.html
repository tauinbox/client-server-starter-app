<mat-card class="section-card">
  <mat-card-header>
    <mat-card-title>Resources</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    @if (loading() && resources().length === 0) {
      <div class="loading-container">
        <mat-spinner></mat-spinner>
      </div>
    } @else {
      <table mat-table [dataSource]="resources()" class="resources-table">
        <!-- Display Name Column -->
        <ng-container matColumnDef="displayName">
          <th mat-header-cell *matHeaderCellDef>Display Name</th>
          <td mat-cell *matCellDef="let resource">
            {{ resource.displayName }}
          </td>
        </ng-container>

        <!-- Name Column -->
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Name</th>
          <td mat-cell *matCellDef="let resource">
            <code>{{ resource.name }}</code>
          </td>
        </ng-container>

        <!-- Subject Column -->
        <ng-container matColumnDef="subject">
          <th mat-header-cell *matHeaderCellDef>Subject</th>
          <td mat-cell *matCellDef="let resource">
            <code>{{ resource.subject }}</code>
          </td>
        </ng-container>

        <!-- Description Column -->
        <ng-container matColumnDef="description">
          <th mat-header-cell *matHeaderCellDef>Description</th>
          <td mat-cell *matCellDef="let resource">
            {{ resource.description ?? '—' }}
          </td>
        </ng-container>

        <!-- System Column -->
        <ng-container matColumnDef="system">
          <th mat-header-cell *matHeaderCellDef>System</th>
          <td mat-cell *matCellDef="let resource">
            @if (resource.isSystem) {
              <mat-chip color="primary" highlighted>System</mat-chip>
            }
          </td>
        </ng-container>

        <!-- Actions Column -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let resource">
            @if (canUpdate()) {
              <button
                mat-icon-button
                color="accent"
                (click)="openEditResource(resource)"
                matTooltip="Edit Resource"
                [attr.aria-label]="'Edit resource ' + resource.displayName"
              >
                <mat-icon>edit</mat-icon>
              </button>
            }
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="resourceColumns"></tr>
        <tr mat-row *matRowDef="let _; columns: resourceColumns"></tr>
      </table>
    }
  </mat-card-content>
</mat-card>
