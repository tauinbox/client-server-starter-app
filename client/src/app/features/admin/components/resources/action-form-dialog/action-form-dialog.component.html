<ng-container *transloco="let t; scope: 'admin'">
  <h2 mat-dialog-title>
    {{
      isEdit ? t('admin.actionForm.editTitle') : t('admin.actionForm.addTitle')
    }}
  </h2>

  <mat-dialog-content>
    <form (submit)="$event.preventDefault(); submit()">
      <app-form-field
        [field]="actionForm.name"
        label="admin.actionForm.nameLabel"
      >
        @if (isEdit) {
          <button
            formFieldSuffix
            mat-icon-button
            type="button"
            [matTooltip]="t('admin.actionForm.nameImmutableHint')"
            [attr.aria-label]="t('admin.actionForm.nameImmutableHint')"
            class="hint-button"
          >
            <mat-icon>info_outline</mat-icon>
          </button>
        }
      </app-form-field>

      <app-form-field
        [field]="actionForm.displayName"
        label="admin.actionForm.displayNameLabel"
      />

      <app-form-field
        [field]="actionForm.description"
        label="admin.actionForm.descriptionLabel"
        type="textarea"
      />
    </form>

    @if (errorMessage()) {
      <p class="form-error" role="alert">{{ errorMessage() }}</p>
    }
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button
      matButton="text"
      type="button"
      [disabled]="isLoading()"
      (click)="cancel()"
    >
      {{ t('common.cancel') }}
    </button>
    <button
      matButton="filled"
      type="button"
      [disabled]="
        actionForm().invalid() || (isEdit && !formChanged) || isLoading()
      "
      (click)="submit()"
    >
      @if (isLoading()) {
        <mat-spinner diameter="18" />
      }
      {{ isEdit ? t('common.saveChanges') : t('admin.actionForm.addButton') }}
    </button>
  </mat-dialog-actions>
</ng-container>
