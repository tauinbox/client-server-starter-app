<ng-container *transloco="let t; scope: 'admin'">
  <h2 mat-dialog-title>
    {{
      isEdit ? t('admin.roleForm.editTitle') : t('admin.roleForm.createTitle')
    }}
  </h2>

  <mat-dialog-content>
    @if (isSystemRole) {
      <p class="system-role-warning">{{ t('admin.roleForm.systemWarning') }}</p>
    }

    <form (submit)="$event.preventDefault(); submit()">
      <app-form-field
        [field]="roleForm.name"
        label="admin.roleForm.nameLabel"
      />

      <app-form-field
        [field]="roleForm.description"
        label="admin.roleForm.descriptionLabel"
        type="textarea"
      />
    </form>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()">
      {{ t('common.cancel') }}
    </button>
    @if (!isSystemRole) {
      <button
        mat-raised-button
        color="primary"
        type="button"
        [disabled]="roleForm().invalid() || !formChanged"
        (click)="submit()"
      >
        {{
          isEdit ? t('common.saveChanges') : t('admin.roleForm.createButton')
        }}
      </button>
    }
  </mat-dialog-actions>
</ng-container>
