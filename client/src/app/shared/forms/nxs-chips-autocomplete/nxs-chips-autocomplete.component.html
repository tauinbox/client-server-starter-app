<ng-container *transloco="let t">
  <mat-form-field
    appearance="outline"
    class="full-width"
    subscriptSizing="dynamic"
  >
    @if (label()) {
      <mat-label>{{ t(label()) }}</mat-label>
    }
    <mat-chip-grid
      #chipGrid
      [attr.aria-label]="ariaLabel() ? t(ariaLabel()) : null"
    >
      @for (chip of selected(); track chip.value) {
        <mat-chip-row (removed)="removeChip(chip)" [removable]="true">
          {{ chip.label }}
          <button
            matChipRemove
            type="button"
            [attr.aria-label]="
              t('forms.chips.removeChip', { label: chip.label })
            "
          >
            <mat-icon>cancel</mat-icon>
          </button>
        </mat-chip-row>
      }
      <input
        #chipInput
        [matChipInputFor]="chipGrid"
        [matChipInputSeparatorKeyCodes]="separators"
        [matAutocomplete]="auto"
        [matChipInputAddOnBlur]="allowFreeText()"
        [placeholder]="placeholder() ? t(placeholder()) : ''"
        (matChipInputTokenEnd)="addFromTokenEnd($event)"
        (input)="onInput($any($event.target).value)"
      />
    </mat-chip-grid>
    <mat-autocomplete
      #auto="matAutocomplete"
      (optionSelected)="addFromOption($event)"
    >
      @for (opt of filteredOptions(); track opt.value) {
        <mat-option [value]="opt">
          <span class="chip-opt-label">{{ opt.label }}</span>
          @if (opt.sub) {
            <span class="chip-opt-sub">{{ opt.sub }}</span>
          }
        </mat-option>
      }
    </mat-autocomplete>
  </mat-form-field>
</ng-container>
