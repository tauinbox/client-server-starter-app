<ng-container *transloco="let t">
  <mat-form-field
    appearance="outline"
    class="full-width"
    subscriptSizing="dynamic"
  >
    <mat-label>{{ t(label()) }}</mat-label>

    @if (prefixIcon()) {
      <mat-icon matPrefix aria-hidden="true">{{ prefixIcon() }}</mat-icon>
    }

    @if (type() === 'textarea') {
      <textarea
        matInput
        [formField]="field()"
        [placeholder]="t(label())"
        [rows]="rows()"
        [autocomplete]="autocomplete() ?? 'off'"
        [attr.aria-describedby]="
          field()().invalid() && field()().touched() ? errorId : null
        "
      ></textarea>
    } @else {
      <input
        matInput
        [type]="type()"
        [formField]="field()"
        [placeholder]="t(label())"
        [autocomplete]="autocomplete() ?? 'off'"
        [attr.aria-describedby]="
          field()().invalid() && field()().touched() ? errorId : null
        "
      />
    }

    <ng-content select="[formFieldSuffix]" />

    @if (hint()) {
      <mat-hint>{{ t(hint()!) }}</mat-hint>
    }

    @if (activeError(); as error) {
      <mat-error [id]="errorId">{{ t(error.key, error.params) }}</mat-error>
    }
  </mat-form-field>
</ng-container>
