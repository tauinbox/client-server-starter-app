<div
  *transloco="let t"
  class="password-strength"
  [attr.data-strength]="score()"
  role="progressbar"
  [attr.aria-valuenow]="score()"
  aria-valuemin="0"
  aria-valuemax="4"
  [attr.aria-valuetext]="score() === 0 ? '' : t(labelKey())"
>
  @if (score() > 0) {
    <div class="strength-bars" aria-hidden="true">
      @for (i of bars; track i) {
        <div class="strength-bar" [class.filled]="score() >= i"></div>
      }
    </div>
    <span class="strength-label" aria-live="polite">
      {{ t(labelKey()) }}
    </span>
  }
</div>
