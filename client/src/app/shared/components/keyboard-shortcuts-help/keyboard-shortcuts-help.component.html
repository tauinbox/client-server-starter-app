<h2 mat-dialog-title>Keyboard Shortcuts</h2>

<mat-dialog-content>
  @if (groupedShortcuts().length === 0) {
    <p class="empty-state">No shortcuts available.</p>
  } @else {
    @for (group of groupedShortcuts(); track group.group) {
      <h3 class="group-heading">{{ group.group }}</h3>
      <table class="shortcuts-table">
        @for (shortcut of group.shortcuts; track shortcut.key) {
          <tr>
            <td>
              <kbd class="key-badge">{{ shortcut.key }}</kbd>
            </td>
            <td>{{ shortcut.label }}</td>
          </tr>
        }
      </table>
    }
  }
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Close</button>
</mat-dialog-actions>
